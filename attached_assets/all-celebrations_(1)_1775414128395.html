<head>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#F4EDD8; overflow-x:hidden; }

.header { background:#1C1F2E; padding:20px 28px; background-image:radial-gradient(ellipse at 80% 50%,rgba(208,138,16,.12) 0%,transparent 60%); }
.header h1 { font-family:'DM Serif Display',serif; font-size:20px; color:#FDFAF2; font-weight:400; }
.header p { font-size:11px; color:rgba(255,255,255,.4); margin-top:4px; }
.header .ey { font-size:9px; font-weight:600; letter-spacing:.18em; color:#D08A10; text-transform:uppercase; margin-bottom:4px; }

.tier-section { padding:20px 0 10px; border-bottom:1.5px solid rgba(208,138,16,.1); }
.tier-header { padding:0 28px 12px; display:flex; align-items:center; gap:10px; }
.tier-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:white; flex-shrink:0; }
.tier-info h2 { font-family:'DM Serif Display',serif; font-size:16px; color:#1C1F2E; font-weight:400; }
.tier-info p { font-size:10px; color:#8A7A50; margin-top:2px; }

.scroll-row { display:flex; gap:12px; overflow-x:auto; padding:0 28px 16px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
.scroll-row::-webkit-scrollbar { height:4px; }
.scroll-row::-webkit-scrollbar-thumb { background:rgba(208,138,16,.2); border-radius:4px; }

.card {
  min-width:160px; max-width:160px; border-radius:14px; padding:12px;
  cursor:pointer; scroll-snap-align:start; position:relative; overflow:hidden;
  border:1.5px solid rgba(208,138,16,.12); transition:transform .15s;
  flex-shrink:0;
}
.card:hover { transform:translateY(-3px); }
.card.dark { background:#0D0D1A; border-color:rgba(255,255,255,.08); }
.card.light { background:#FDFAF2; }

.card .play-zone {
  height:100px; display:flex; align-items:center; justify-content:center;
  border-radius:10px; margin-bottom:8px; position:relative; overflow:hidden;
}
.card.light .play-zone { background:rgba(208,138,16,.03); }
.card.dark .play-zone { background:rgba(255,255,255,.03); }

.card .icon-resting { font-size:28px; transition:opacity .15s; }
.card .c-name { font-family:'DM Serif Display',serif; font-size:11px; color:#1C1F2E; margin-bottom:2px; }
.card.dark .c-name { color:white; }
.card .c-xp { font-size:9px; font-weight:700; margin-bottom:3px; }
.card .c-when { font-size:8px; color:#8A7A50; line-height:1.4; }
.card.dark .c-when { color:rgba(255,255,255,.35); }
.card .tap-hint { font-size:8px; color:rgba(208,138,16,.5); text-align:center; margin-top:6px; font-weight:600; letter-spacing:.06em; }

/* ═══ ANIMATIONS ═══ */
@keyframes flash { 0%{opacity:1} 100%{opacity:0} }
@keyframes coinflip { 0%{transform:scale(0) rotateY(0);opacity:0} 30%{transform:scale(1.3) rotateY(180deg);opacity:1} 60%{transform:scale(1) rotateY(360deg)} 100%{transform:scale(.7) translateY(-16px);opacity:0} }
@keyframes riseout { 0%{opacity:0;transform:translateY(0) scale(.7)} 15%{opacity:1;transform:translateY(-5px) scale(1)} 70%{opacity:1;transform:translateY(-18px)} 100%{opacity:0;transform:translateY(-28px) scale(.9)} }
@keyframes megapop { 0%{transform:scale(0);opacity:0} 30%{transform:scale(1.9);opacity:1} 50%{transform:scale(.8)} 65%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes smallpop { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.15);opacity:1} 100%{transform:scale(1)} }
@keyframes slamin { 0%{transform:scale(2.2);opacity:0} 35%{transform:scale(.9);opacity:1} 55%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
@keyframes xpup { 0%{transform:translateY(10px) scale(.7);opacity:0} 50%{transform:translateY(-2px) scale(1.05);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
@keyframes particle { 0%{transform:translate(0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
@keyframes sparklepop { 0%{transform:scale(0);opacity:0} 40%{transform:scale(1.3);opacity:1} 100%{transform:scale(0);opacity:0} }
@keyframes shakebox { 0%,100%{transform:translate(0)} 15%{transform:translate(-3px,-2px)} 30%{transform:translate(3px,2px)} 45%{transform:translate(-2px,2px)} 60%{transform:translate(2px,-1px)} }
@keyframes fireup { 0%{opacity:0;transform:translateY(100%)} 30%{opacity:.7} 100%{opacity:0;transform:translateY(0)} }
@keyframes bannerslide { 0%{transform:translateY(-100%);opacity:0} 100%{transform:translateY(0);opacity:1} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes starpop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 40%{transform:scale(1.3) rotate(5deg);opacity:1} 70%{transform:scale(.9) rotate(-3deg)} 100%{transform:scale(1) rotate(0)} }
@keyframes shieldflash { 0%{transform:scale(0);opacity:0;filter:brightness(2)} 40%{transform:scale(1.1);opacity:1;filter:brightness(1.3)} 100%{transform:scale(1);filter:brightness(1)} }
@keyframes arrowup { 0%{transform:translateY(10px);opacity:0} 40%{transform:translateY(-3px);opacity:1} 100%{transform:translateY(0)} }

.anim-flash { position:absolute;inset:0;border-radius:10px;z-index:5;animation:flash .4s ease-out forwards; }
.anim-coinflip { animation:coinflip .8s ease-out forwards; font-size:28px; position:absolute; z-index:6; }
.anim-riseout { animation:riseout 2s ease-out forwards; position:absolute; z-index:7; bottom:8px; }
.anim-megapop { animation:megapop .7s cubic-bezier(.17,.89,.32,1.35) forwards; z-index:6; }
.anim-smallpop { animation:smallpop .5s ease-out forwards; z-index:6; }
.anim-slamin { animation:slamin .5s cubic-bezier(.17,.89,.32,1.49) forwards; opacity:0; z-index:7; }
.anim-xpup { animation:xpup .6s cubic-bezier(.34,1.56,.64,1) forwards; opacity:0; z-index:7; }
.anim-shake { animation:shakebox .4s ease-out; }
.anim-starpop { animation:starpop .6s cubic-bezier(.34,1.56,.64,1) forwards; z-index:6; }
.anim-shieldflash { animation:shieldflash .6s ease-out forwards; z-index:6; }
.anim-arrowup { animation:arrowup .8s ease-out forwards; z-index:6; }
.anim-pulse { animation:pulse .5s ease-out; }
.anim-bannerslide { animation:bannerslide .5s cubic-bezier(.34,1.56,.64,1) forwards; z-index:6; }
.xp-pill { padding:3px 10px; border-radius:10px; font-weight:700; font-size:9px; color:white; white-space:nowrap; }
.xp-purple { background:#4A2BA0; box-shadow:0 2px 8px rgba(74,43,160,.4); }
.xp-amber { background:#D08A10; box-shadow:0 2px 8px rgba(208,138,16,.4); }
.xp-gold { background:linear-gradient(90deg,#FFD700,#D08A10); color:#1C1F2E; box-shadow:0 2px 8px rgba(255,215,0,.4); }

.slam-text { font-family:'DM Sans'; font-weight:800; text-align:center; letter-spacing:.02em; line-height:1.2; }
.slam-sub { font-size:7px; text-align:center; margin-top:2px; }

.particle { position:absolute; border-radius:50%; animation:particle .6s ease-out forwards; z-index:4; }
.sparkle { position:absolute; animation:sparklepop .5s ease-out forwards; opacity:0; z-index:4; color:#FFD54F; }
.fire-burst { position:absolute;bottom:0;left:0;right:0;height:40%;z-index:3; background:linear-gradient(to top,rgba(255,109,0,.35),transparent); animation:fireup 1.2s ease-out forwards; }

/* Scale bar */
.scale-bar { display:flex; align-items:center; gap:0; padding:12px 28px 6px; }
.scale-seg { flex:1; height:4px; }
.scale-labels { display:flex; justify-content:space-between; padding:0 28px 8px; }
.scale-labels span { font-size:9px; font-weight:700; }
</style>

function createParticles(zone, count) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / count) * 360;
    const dist = 30 + Math.random() * 40;
    p.style.cssText = `left:50%;top:45%;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;background:${COLORS[i%COLORS.length]};--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;animation-delay:${Math.random()*.15}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    zone.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function createSparkles(zone, count) {
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = '✦';
    s.style.cssText = `left:${10+Math.random()*80}%;top:${5+Math.random()*60}%;font-size:${6+Math.random()*8}px;animation-delay:${.1+Math.random()*.4}s`;
    zone.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function playCelebration(card, tier, item) {
  if (card.dataset.playing === 'true') return;
  card.dataset.playing = 'true';
  const zone = card.querySelector('.play-zone');
  const resting = card.querySelector('.icon-resting');
  if (resting) resting.style.opacity = '0';

  const dur = tier <= 1 ? 1800 : tier <= 2 ? 2500 : tier <= 3 ? 3500 : tier <= 4 ? 4500 : 6000;

  // Tier 0: just pulse the XP
  if (tier === 0) {
    const xpEl = document.createElement('div');
    xpEl.className = 'xp-pill xp-purple anim-riseout';
    xpEl.style.cssText = 'position:absolute;bottom:10px;right:10px;z-index:7;font-size:8px';
    xpEl.textContent = `+${item.xp} XP`;
    zone.appendChild(xpEl);
    setTimeout(() => { xpEl.remove(); card.dataset.playing='false'; if(resting)resting.style.opacity='1'; }, dur);
    return;
  }

  // Tier 1: micro icon + XP pill
  if (tier === 1) {
    const iconEl = document.createElement('div');
    iconEl.style.cssText = 'position:absolute;z-index:6;font-size:24px;';
    if (item.anim === 'shield') { iconEl.className = 'anim-shieldflash'; iconEl.textContent = '🛡️'; }
    else if (item.anim === 'arrow') { iconEl.className = 'anim-arrowup'; iconEl.textContent = '⬆️'; }
    else if (item.anim === 'star') { iconEl.className = 'anim-starpop'; iconEl.textContent = '⭐'; }
    else if (item.anim === 'check') { iconEl.className = 'anim-smallpop'; iconEl.textContent = '✅'; }
    else { iconEl.className = 'anim-coinflip'; iconEl.textContent = '💰'; }
    zone.appendChild(iconEl);

    setTimeout(() => {
      const xp = document.createElement('div');
      xp.className = 'xp-pill xp-purple anim-riseout';
      xp.style.cssText = 'position:absolute;bottom:8px;right:8px;z-index:7';
      xp.textContent = `+${item.xp} XP ⚡`;
      zone.appendChild(xp);
      setTimeout(() => xp.remove(), 2000);
    }, 300);

    setTimeout(() => { iconEl.remove(); card.dataset.playing='false'; if(resting)resting.style.opacity='1'; }, dur);
    return;
  }

  // Tier 2+: flash
  if (tier >= 2) {
    const flash = document.createElement('div');
    flash.className = 'anim-flash';
    flash.style.background = tier >= 5 ? 'rgba(255,215,0,.5)' : tier >= 4 ? 'rgba(255,215,0,.35)' : 'rgba(208,138,16,.2)';
    zone.appendChild(flash);
    setTimeout(() => flash.remove(), 500);
  }

  // Tier 4+: shake
  if (tier >= 4) {
    zone.classList.add('anim-shake');
    setTimeout(() => zone.classList.remove('anim-shake'), 500);
  }

  // Tier 5: fire
  if (tier >= 5) {
    const fire = document.createElement('div');
    fire.className = 'fire-burst';
    zone.appendChild(fire);
    setTimeout(() => fire.remove(), 1500);
  }

  // Tier 3+: particles
  if (tier >= 3) {
    setTimeout(() => createParticles(zone, tier >= 5 ? 30 : tier >= 4 ? 20 : 12), 200);
  }

  // Tier 4+: sparkles
  if (tier >= 4) {
    setTimeout(() => createSparkles(zone, tier >= 5 ? 8 : 4), 300);
  }

  // Icon megapop (tier 2 = small, tier 3+ = mega)
  setTimeout(() => {
    const ico = document.createElement('div');
    ico.className = tier >= 3 ? 'anim-megapop' : 'anim-smallpop';
    ico.style.cssText = `font-size:${tier>=5?44:tier>=4?36:tier>=3?30:22}px;text-align:center`;
    ico.textContent = item.icon;
    zone.appendChild(ico);
    setTimeout(() => ico.remove(), dur);
  }, tier >= 3 ? 300 : 200);

  // SLAM text (tier 2 as banner, tier 3+ as overlay)
  if (item.slam) {
    setTimeout(() => {
      if (tier === 2) {
        const banner = document.createElement('div');
        banner.className = 'anim-bannerslide';
        banner.style.cssText = 'position:absolute;top:0;left:0;right:0;background:white;padding:8px;box-shadow:0 3px 12px rgba(0,0,0,.1);border-radius:10px 10px 0 0;z-index:8';
        banner.innerHTML = `<div style="font-family:'DM Serif Display',serif;font-size:11px;color:#1C1F2E">${item.slam}</div><div style="font-size:7px;color:#8A7A50;margin-top:2px">${item.when}</div>`;
        zone.appendChild(banner);
        setTimeout(() => banner.remove(), dur);
      } else {
        const slam = document.createElement('div');
        slam.className = 'anim-slamin';
        slam.style.cssText = `text-align:center;z-index:8;position:relative;margin-top:4px`;
        const dark = tier >= 4;
        slam.innerHTML = `<div class="slam-text" style="font-size:${tier>=5?14:tier>=4?12:10}px;color:${dark?'#FFD54F':'#1C1F2E'}">${item.slam}</div>${item.sub?`<div class="slam-sub" style="color:${dark?'rgba(255,255,255,.5)':'#8A7A50'}">${item.sub}</div>`:''}`;
        zone.appendChild(slam);
        setTimeout(() => slam.remove(), dur);
      }
    }, tier >= 3 ? 600 : 400);
  }

  // XP counter
  if (item.xp) {
    setTimeout(() => {
      const xpEl = document.createElement('div');
      xpEl.className = 'anim-xpup';
      const cls = tier >= 5 ? 'xp-gold' : tier >= 4 ? 'xp-amber' : 'xp-purple';
      xpEl.style.cssText = 'text-align:center;position:relative;z-index:8;margin-top:6px';
      xpEl.innerHTML = `<span class="xp-pill ${cls}" style="font-size:${tier>=4?11:9}px">+${item.xp.toLocaleString()} XP ${tier>=5?'🏆':'⚡'}</span>`;
      zone.appendChild(xpEl);
      setTimeout(() => xpEl.remove(), dur);
    }, tier >= 3 ? 900 : 600);
  }

  // Dark bg for tier 4+
  if (tier >= 4) {
    zone.style.background = 'rgba(13,13,26,.95)';
    setTimeout(() => { zone.style.background = ''; }, dur);
  }

  setTimeout(() => { card.dataset.playing='false'; if(resting)resting.style.opacity='1'; }, dur);
}

// Build DOM
const app = document.getElementById('app');

tiers.forEach(t => {
  const section = document.createElement('div');
  section.className = 'tier-section';

  section.innerHTML = `
    <div class="tier-header">
      <div class="tier-dot" style="background:${t.color}">${t.tier}</div>
      <div class="tier-info">
        <h2>Tier ${t.tier} · ${t.name}</h2>
        <p>${t.desc} — <strong>${t.items.length} celebrations</strong></p>
      </div>
    </div>
  `;

  const row = document.createElement('div');
  row.className = 'scroll-row';

  t.items.forEach(item => {
    const dark = t.tier >= 4;
    const card = document.createElement('div');
    card.className = `card ${dark ? 'dark' : 'light'}`;
    card.dataset.playing = 'false';

    card.innerHTML = `
      <div class="play-zone">
        <div class="icon-resting">${item.icon}</div>
      </div>
      <div class="c-name">${item.name}</div>
      <div class="c-xp" style="color:${t.color}">${item.xp ? '+'+item.xp.toLocaleString()+' XP' : 'LEVEL UP'}</div>
      <div class="c-when">${item.when}</div>
      <div class="tap-hint">TAP ▶</div>
    `;

    card.addEventListener('click', () => playCelebration(card, t.tier, item));
    row.appendChild(card);
  });

  section.appendChild(row);
  app.appendChild(section);
});

// Footer
const footer = document.createElement('div');
footer.style.cssText = 'text-align:center;padding:24px 0 40px;font-size:9px;color:#C4AA70;letter-spacing:.16em;font-weight:500;text-transform:uppercase';
footer.textContent = `DebtPath · ${tiers.reduce((a,t)=>a+t.items.length,0)} Celebrations · 6 Tiers · Tap to Play`;
app.appendChild(footer);
</script>
</body>
</html>
