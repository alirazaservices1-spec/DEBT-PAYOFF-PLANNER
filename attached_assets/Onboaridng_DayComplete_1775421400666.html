<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-serif-display@5/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/plus-jakarta-sans@8/index.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes mascotIn{0%{opacity:0;transform:scale(0.55) translateY(20px)}60%{transform:scale(1.07) translateY(-6px)}80%{transform:scale(0.97) translateY(2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0.4) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(22deg)}}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(340px) rotate(500deg)}}
@keyframes badgePop{0%{opacity:0;transform:scale(0.5)}70%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes quoteIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.wrap{display:flex;justify-content:center;padding:32px}

.phone{
  width:345px;
  background:#1B1050;
  border-radius:46px;
  border:7px solid #0A0628;
  box-shadow:0 32px 80px rgba(0,0,0,0.5),0 8px 20px rgba(0,0,0,0.25);
  display:flex;flex-direction:column;align-items:center;
  padding:0;
  position:relative;overflow:hidden;
}
.phone::before{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:82px;height:5px;background:rgba(255,255,255,0.14);border-radius:3px;z-index:10}

.bg-glow{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 50% 25%,rgba(120,90,255,0.35) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(80,60,200,0.2) 0%,transparent 50%);
  pointer-events:none;
}

/* Confetti */
.cf{position:absolute;animation:confetti linear both;pointer-events:none;z-index:3}
.cf1{width:8px;height:8px;background:#F5C842;border-radius:2px;left:12%;top:8%;animation-duration:3.2s;animation-delay:0.1s}
.cf2{width:5px;height:12px;background:#7DE8B0;border-radius:1px;left:26%;top:4%;animation-duration:3.5s;animation-delay:0.3s}
.cf3{width:9px;height:5px;background:#FF8080;border-radius:2px;left:56%;top:6%;animation-duration:2.9s;animation-delay:0.05s;transform:rotate(-20deg)}
.cf4{width:7px;height:7px;background:#C0A8FF;border-radius:50%;left:72%;top:3%;animation-duration:3.6s;animation-delay:0.4s}
.cf5{width:8px;height:8px;background:#fff;border-radius:2px;left:86%;top:9%;animation-duration:3.0s;animation-delay:0.2s}
.cf6{width:5px;height:10px;background:#F5C842;border-radius:1px;left:6%;top:18%;animation-duration:3.3s;animation-delay:0.65s}
.cf7{width:7px;height:5px;background:#FF8080;border-radius:2px;left:44%;top:2%;animation-duration:2.8s;animation-delay:0.15s;transform:rotate(30deg)}
.cf8{width:6px;height:6px;background:#7DE8B0;border-radius:50%;left:91%;top:14%;animation-duration:3.4s;animation-delay:0.5s}
.cf9{width:6px;height:10px;background:#C0A8FF;border-radius:1px;left:62%;top:16%;animation-duration:2.7s;animation-delay:0.38s}
.cf10{width:8px;height:5px;background:#F5C842;border-radius:2px;left:33%;top:11%;animation-duration:3.1s;animation-delay:0.48s;transform:rotate(-40deg)}

/* ── TOP ── */
.top{
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:50px 22px 36px;
  position:relative;z-index:4;
}

/* Badges */
.badges{
  width:100%;display:flex;justify-content:space-between;
  margin-bottom:22px;
  animation:badgePop 0.55s cubic-bezier(0.34,1.56,0.64,1) both 0.1s;
}
.tbadge{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.16);
  border-radius:100px;padding:10px 16px;
}
.tbadge-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#fff;line-height:1}
.tbadge.streak .tbadge-text{color:#F5C842}
.tbadge.xp .tbadge-text{color:#80EEC0}

/* Mascot */
.mascot-wrap{position:relative;margin-bottom:6px}
.mascot-anim{animation:mascotIn 1s cubic-bezier(0.34,1.56,0.64,1) both 0.2s}
.mascot-float{animation:float 3.8s ease-in-out infinite 1.5s}
.sp{position:absolute;animation:sparkle 2.5s ease-in-out infinite}
.sp1{top:0;left:14px;animation-delay:0s}
.sp2{top:10px;right:6px;animation-delay:0.9s}
.sp3{bottom:72px;left:-10px;animation-delay:1.6s}
.sp4{top:34px;left:-18px;animation-delay:0.4s}

/* Eyebrow */
.eyebrow{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);
  margin-bottom:10px;
  animation:fadeUp 0.45s ease both 0.72s;
}

/* Headline */
.headline{
  font-family:'DM Serif Display',serif;
  font-size:38px;font-weight:400;color:#fff;
  text-align:center;line-height:1.12;
  margin-bottom:20px;
  animation:fadeUp 0.5s ease both 0.82s;
}
.headline em{font-style:italic;color:#C0A8FF}

/* Quote card — replaces XP rows */
.quote-card{
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.13);
  border-radius:20px;
  padding:22px 20px;
  margin-bottom:22px;
  position:relative;
  animation:fadeUp 0.55s ease both 1.0s;
  overflow:hidden;
}
.quote-card::before{
  content:'\201C';
  position:absolute;top:-8px;left:14px;
  font-family:'DM Serif Display',serif;
  font-size:72px;color:rgba(192,168,255,0.18);
  line-height:1;pointer-events:none;
}
.quote-text{
  font-family:'DM Serif Display',serif;
  font-size:18px;line-height:1.55;
  color:#fff;
  font-style:italic;
  position:relative;z-index:1;
  animation:quoteIn 0.5s ease both 1.1s;
}
.quote-attr{
  margin-top:14px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);
}
/* Dot indicators for quote cycling */
.quote-dots{
  display:flex;gap:5px;margin-top:12px;justify-content:center;
}
.qdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.3s,width 0.3s}
.qdot.on{background:#C0A8FF;width:14px;border-radius:10px}

/* Total strip */
.total{
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
  animation:fadeUp 0.5s ease both 1.2s;
}
.t-left .t-lbl{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);margin-bottom:4px;
}
.t-left .t-num{
  font-family:'DM Serif Display',serif;
  font-size:42px;color:#fff;line-height:1;
  display:flex;align-items:baseline;gap:5px;
}
.t-left .t-num sup{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:700;color:rgba(255,255,255,0.4);
}
.t-right{display:flex;flex-direction:column;align-items:center;gap:2px}
.t-fire{font-size:26px;line-height:1}
.t-streak{font-family:'DM Serif Display',serif;font-size:28px;color:#F5C842;line-height:1}
.t-sl{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);
}

/* CTA */
.btn{
  width:100%;
  background:#C07820;color:#fff;
  border:none;border-radius:16px;
  padding:20px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;letter-spacing:0.01em;
  animation:fadeUp 0.5s ease both 1.4s;
  transition:background 0.13s,transform 0.08s;
  box-shadow:0 8px 28px rgba(192,120,32,0.4);
  margin-bottom:16px;
}
.btn:hover{background:#A86510}.btn:active{transform:scale(0.98)}

.skip{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;color:rgba(255,255,255,0.45);
  animation:fadeUp 0.4s ease both 1.5s;
}
.skip a{color:rgba(255,255,255,0.75);font-weight:700;text-decoration:underline}
</style>

    <div class="bg-glow"></div>

    <div class="cf cf1"></div><div class="cf cf2"></div><div class="cf cf3"></div>
    <div class="cf cf4"></div><div class="cf cf5"></div><div class="cf cf6"></div>
    <div class="cf cf7"></div><div class="cf cf8"></div><div class="cf cf9"></div><div class="cf cf10"></div>

    <div class="top">

      <div class="badges">
        <div class="tbadge streak"><span class="tbadge-text">🔥 1 Day Streak</span></div>

      </div>

      <div class="mascot-wrap">

        <div class="mascot-anim">
          <div class="mascot-float">

              <circle cx="56" cy="82" r="28" fill="#D09828"/>
              <circle cx="204" cy="82" r="28" fill="#D09828"/>
              <circle cx="56" cy="82" r="16" fill="#C08020"/>
              <circle cx="204" cy="82" r="16" fill="#C08020"/>
              <ellipse cx="104" cy="144" rx="28" ry="32" fill="white"/>

              <circle cx="108" cy="148" r="18" fill="#1A0800"/>

              <polygon points="222,46 224,52 230,52 225,56 227,62 222,58 217,62 219,56 214,52 220,52" fill="#C0A8FF" opacity="0.8"/>
              <polygon points="178,26 179.5,31 185,31 181,34 182.5,39 178,36 173.5,39 175,34 171,31 176.5,31" fill="#fff" opacity="0.55"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Headline is injected by JS -->
      <h1 class="headline" id="headline"></h1>

      <!-- Quote card with rotating Dex lines from milestone map -->
      <div class="quote-card">
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-attr" id="quoteAttr"></p>
        <div class="quote-dots" id="quoteDots"></div>
      </div>

      <div class="total">
        <div class="t-left">
          <div class="t-lbl">Total XP Earned</div>
          <div class="t-num">85<sup>XP</sup></div>
        </div>
        <div class="t-right">
          <div class="t-fire">🔥</div>

      </div>

      <button class="btn">See you tomorrow 👋</button>
      <p class="skip">All done for today? <a href="#">Skip</a></p>

    </div>
  </div>

<script>
// All Dex Lines from the milestone map — keyed by context
const messages = [
  {
    headline: "You crushed it\n<em>today!</em>",
    quote: "You just did what most people never do — you started.",
    attr: "Day 1"
  },
  {
    headline: "Every payment\n<em>matters.</em>",
    quote: "Every payment is a giant step. The math is already working.",
    attr: "Week 1"
  },
  {
    headline: "You're raising\n<em>the bar.</em>",
    quote: "You raised the bar. Debt doesn't get to define you anymore.",
    attr: "Week 2–3"
  },
  {
    headline: "This is your\n<em>identity now.</em>",
    quote: "Thirty days. This isn't motivation. It's identity.",
    attr: "Month 1"
  },
  {
    headline: "Breaking through\n<em>every day.</em>",
    quote: "This is your breakthrough. The old habits are gone.",
    attr: "Month 2–3"
  },
  {
    headline: "You're\n<em>executing.</em>",
    quote: "You're not reacting to bills. You're executing a plan.",
    attr: "Month 3–5"
  },
  {
    headline: "Nothing can\n<em>shake you.</em>",
    quote: "Six months. Nothing has shaken you off this path.",
    attr: "Month 5–7"
  },
  {
    headline: "Every day you\n<em>show up.</em>",
    quote: "Every day you show up, your debt-free date gets closer.",
    attr: "Ongoing"
  },
  {
    headline: "Keep the\n<em>streak alive.</em>",
    quote: "Where focus goes, energy flows. And you haven't lost focus once.",
    attr: "Month 8"
  },
  {
    headline: "You came back.\n<em>That matters.</em>",
    quote: "Your past does not equal your future. Your progress is right here.",
    attr: "Recovery"
  },
  {
    headline: "One step\n<em>at a time.</em>",
    quote: "Every day you show up, the debt gets weaker.",
    attr: "Day 75"
  },
  {
    headline: "100 days of\n<em>action.</em>",
    quote: "You've taken more action than most people take in a lifetime.",
    attr: "Day 100"
  },
  {
    headline: "Storms came.\n<em>You didn't budge.</em>",
    quote: "120 days. Storms came. You didn't budge.",
    attr: "Month 4"
  },
  {
    headline: "Half a year.\n<em>Still going.</em>",
    quote: "Half a year. Nothing has shaken you. That's not discipline — that's power.",
    attr: "Month 6"
  },
  {
    headline: "Almost\n<em>there.</em>",
    quote: "There's almost nothing left between you and freedom.",
    attr: "85% Done"
  }
];

// Pick today's message deterministically by day-of-year so it changes daily
const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
const todayIdx = dayOfYear % messages.length;

// Show today + 2 more as tappable alternates
const indices = [todayIdx, (todayIdx+1)%messages.length, (todayIdx+2)%messages.length];
let current = 0;

function render(i) {
  const m = messages[indices[i]];
  document.getElementById('headline').innerHTML = m.headline.replace('\n','<br>');
  document.getElementById('quoteText').style.animation = 'none';
  document.getElementById('quoteText').offsetHeight; // reflow
  document.getElementById('quoteText').style.animation = 'quoteIn 0.4s ease both';
  document.getElementById('quoteText').textContent = m.quote;
  document.getElementById('quoteAttr').textContent = m.attr;

  document.querySelectorAll('.qdot').forEach((d,idx) => {
    d.classList.toggle('on', idx === i);
  });
}

// Build dots
const dotsEl = document.getElementById('quoteDots');
indices.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'qdot' + (i===0?' on':'');
  d.onclick = () => { current = i; render(i); };
  dotsEl.appendChild(d);
});

render(0);

// Auto-rotate every 6s
setInterval(() => {
  current = (current+1) % indices.length;
  render(current);
}, 6000);
</script>
