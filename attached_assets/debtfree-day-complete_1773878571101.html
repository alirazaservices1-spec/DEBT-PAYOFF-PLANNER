<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Day Complete!</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #EDE8DC;
    font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  @keyframes popIn {
    0%   { transform: scale(0.6); opacity: 0; }
    70%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes dexJump {
    0%,100% { transform: translateY(0) rotate(0deg); }
    20%     { transform: translateY(-22px) rotate(-6deg); }
    40%     { transform: translateY(-14px) rotate(4deg); }
    60%     { transform: translateY(-20px) rotate(-3deg); }
    80%     { transform: translateY(-8px) rotate(2deg); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120px) rotate(720deg); opacity: 0; }
  }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.05); }
  }
  @keyframes starPop {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .screen {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #EDE8DC;
    position: relative;
    overflow: hidden;
    padding: 48px 28px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .blob-tr {
    position: absolute; top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: #D4C9A8; opacity: 0.45;
    pointer-events: none;
  }
  .blob-bl {
    position: absolute; bottom: -50px; left: -50px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: #D4C9A8; opacity: 0.4;
    pointer-events: none;
  }

  /* Confetti pieces */
  .confetti-piece {
    position: absolute;
    width: 9px; height: 9px;
    border-radius: 2px;
    animation: confettiFall linear both;
    pointer-events: none;
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    color: #A07840;
    text-transform: uppercase;
    margin-bottom: 18px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.1s both;
  }

  .dex-wrap {
    margin-bottom: 18px;
    animation: dexJump 1.1s cubic-bezier(.36,.07,.19,.97) 0.2s both;
  }

  .congrats-badge {
    background: #3D2200;
    color: #F5EFE0;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 50px;
    margin-bottom: 14px;
    animation: popIn 0.5s cubic-bezier(.36,.07,.19,.97) 0.35s both;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 800;
    color: #1C0F00;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 8px;
    animation: fadeUp 0.45s ease 0.45s both;
  }
  h1 em { color: #B87320; font-style: italic; }

  .subtitle {
    font-size: 14.5px;
    color: #6B4F2E;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 26px;
    animation: fadeUp 0.45s ease 0.52s both;
  }

  /* Points card */
  .points-card {
    background: #F5F0E6;
    border-radius: 22px;
    padding: 22px 24px;
    width: 100%;
    box-shadow: 0 2px 16px rgba(100,60,10,0.09);
    margin-bottom: 24px;
    animation: popIn 0.55s cubic-bezier(.36,.07,.19,.97) 0.6s both;
  }

  .points-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(180,140,90,0.15);
  }
  .points-row:last-child { border-bottom: none; }

  .points-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #6B4F2E;
    font-weight: 500;
  }
  .points-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: #EDE8DC;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    border: 1.5px solid rgba(180,140,80,0.2);
  }
  .points-val {
    font-size: 16px;
    font-weight: 700;
    color: #B87320;
  }

  /* Total XP */
  .xp-total {
    background: linear-gradient(135deg, #C8882A, #D9A045, #B87320);
    background-size: 200% auto;
    animation: shimmer 2.5s linear infinite, popIn 0.6s cubic-bezier(.36,.07,.19,.97) 0.7s both;
    border-radius: 18px;
    padding: 18px 24px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    box-shadow: 0 6px 20px rgba(180,120,30,0.28);
  }
  .xp-left { }
  .xp-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(255,240,200,0.8);
    margin-bottom: 4px;
  }
  .xp-number {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .xp-number span {
    font-size: 18px;
    font-weight: 600;
    opacity: 0.85;
    margin-left: 3px;
  }
  .xp-streak {
    text-align: right;
  }
  .xp-streak-num {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .xp-streak-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,240,200,0.8);
    margin-top: 3px;
  }

  /* Stars */
  .stars {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 26px;
  }
  .star {
    font-size: 32px;
    animation: starPop 0.4s cubic-bezier(.36,.07,.19,.97) both;
  }
  .star:nth-child(1) { animation-delay: 0.75s; }
  .star:nth-child(2) { animation-delay: 0.9s; }
  .star:nth-child(3) { animation-delay: 1.05s; }

  .cta {
    width: 100%;
    background: #3D2200;
    color: #F5EFE0;
    border: none;
    border-radius: 50px;
    padding: 18px 0;
    font-size: 17px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease 1.1s both;
  }
  .cta:hover { background: #2a1600; transform: scale(1.01); }
  .cta:active { transform: scale(0.99); }

  .secondary-link {
    font-size: 13px;
    color: #A07840;
    text-align: center;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    animation: fadeUp 0.4s ease 1.2s both;
    opacity: 0;
  }
  .secondary-link:hover { color: #7A5820; }
</style>
</head>
<body>
<div class="screen">
  <div class="blob-tr"></div>
  <div class="blob-bl"></div>

  <!-- Confetti -->
  <div class="confetti-piece" style="left:12%;top:5%; background:#D9A045; animation-duration:1.4s; animation-delay:0.3s;"></div>
  <div class="confetti-piece" style="left:25%;top:2%; background:#C8882A; width:7px;height:12px; border-radius:3px; animation-duration:1.6s; animation-delay:0.5s;"></div>
  <div class="confetti-piece" style="left:45%;top:0%; background:#B87320; animation-duration:1.3s; animation-delay:0.2s;"></div>
  <div class="confetti-piece" style="left:62%;top:3%; background:#E8C270; animation-duration:1.7s; animation-delay:0.6s;"></div>
  <div class="confetti-piece" style="left:78%;top:1%; background:#C8882A; width:6px;height:11px; animation-duration:1.5s; animation-delay:0.4s;"></div>
  <div class="confetti-piece" style="left:88%;top:4%; background:#D9A045; animation-duration:1.2s; animation-delay:0.7s;"></div>
  <div class="confetti-piece" style="left:35%;top:6%; background:#8B5E20; width:8px;height:8px;border-radius:50%; animation-duration:1.8s; animation-delay:0.35s;"></div>
  <div class="confetti-piece" style="left:55%;top:2%; background:#E8C270; width:5px;height:10px; animation-duration:1.4s; animation-delay:0.55s;"></div>

  <p class="label">DEBT-FREE APP</p>

  <!-- Dex Bear -->
  <div class="dex-wrap">
    <svg width="110" height="115" viewBox="0 0 110 115" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="32" r="17" fill="#C8882A"/>
      <circle cx="88" cy="32" r="17" fill="#C8882A"/>
      <circle cx="22" cy="32" r="10" fill="#D9A045" opacity="0.7"/>
      <circle cx="88" cy="32" r="10" fill="#D9A045" opacity="0.7"/>
      <circle cx="55" cy="57" r="36" fill="#D9A045"/>
      <ellipse cx="43" cy="42" rx="10" ry="7" fill="white" opacity="0.18" transform="rotate(-25 43 42)"/>
      <ellipse cx="55" cy="71" rx="16" ry="11" fill="#C8882A" opacity="0.5"/>
      <!-- excited wide eyes -->
      <circle cx="41" cy="52" r="10" fill="#1C0F00"/>
      <circle cx="69" cy="52" r="10" fill="#1C0F00"/>
      <circle cx="44" cy="48" r="4" fill="white"/>
      <circle cx="72" cy="48" r="4" fill="white"/>
      <circle cx="46" cy="50" r="1.5" fill="white" opacity="0.6"/>
      <circle cx="74" cy="50" r="1.5" fill="white" opacity="0.6"/>
      <!-- big happy mouth -->
      <path d="M40,73 Q55,85 70,73" stroke="#8B5E20" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
      <ellipse cx="55" cy="67" rx="4.5" ry="3" fill="#8B5E20" opacity="0.7"/>
      <!-- rosy cheeks -->
      <ellipse cx="30" cy="63" rx="8" ry="5" fill="#E8955A" opacity="0.35"/>
      <ellipse cx="80" cy="63" rx="8" ry="5" fill="#E8955A" opacity="0.35"/>
      <!-- sparkles -->
      <text x="4" y="28" font-size="14">✨</text>
      <text x="88" y="24" font-size="12">⭐</text>
      <!-- body -->
      <ellipse cx="55" cy="103" rx="22" ry="14" fill="#C8882A"/>
      <circle cx="55" cy="100" r="7" fill="#D9A045" opacity="0.5"/>
      <text x="55" y="103.5" text-anchor="middle" font-size="8" fill="#8B5E20" font-weight="bold" opacity="0.9">$</text>
    </svg>
  </div>

  <div class="congrats-badge">🎉 Day Complete!</div>

  <h1>You crushed it <em>today!</em></h1>
  <p class="subtitle">Every day you show up, your debt-free date gets closer. Keep it going.</p>

  <!-- Stars -->
  <div class="stars">
    <span class="star">⭐</span>
    <span class="star">⭐</span>
    <span class="star">⭐</span>
  </div>

  <!-- Points breakdown -->
  <div class="points-card">
    <div class="points-row">
      <div class="points-label"><div class="points-icon">✅</div> Payment logged</div>
      <div class="points-val">+50 XP</div>
    </div>
    <div class="points-row">
      <div class="points-label"><div class="points-icon">🔥</div> Streak bonus</div>
      <div class="points-val">+25 XP</div>
    </div>
    <div class="points-row">
      <div class="points-label"><div class="points-icon">📅</div> Showed up today</div>
      <div class="points-val">+10 XP</div>
    </div>
  </div>

  <!-- Total XP banner -->
  <div class="xp-total">
    <div class="xp-left">
      <p class="xp-label">Total XP Earned</p>
      <p class="xp-number">1,240 <span>XP</span></p>
    </div>
    <div class="xp-streak">
      <p class="xp-streak-num">🔥 7</p>
      <p class="xp-streak-label">Day Streak</p>
    </div>
  </div>

  <!-- CTA -->
  <button class="cta">🏠 Go to Main Menu</button>
  <button class="secondary-link" onclick="window.close()">Close</button>
</div>
</body>
</html>
