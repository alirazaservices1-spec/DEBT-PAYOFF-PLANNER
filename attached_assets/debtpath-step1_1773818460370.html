<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DebtPath – Step 1: Enter Your Debts</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111827;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; font-family: 'Nunito', sans-serif; padding: 32px 20px;
}

/* ── PHONE ── */
.phone {
  width: 340px;
  background: #F7F2EA;
  border-radius: 44px;
  border: 8px solid #1e2535;
  box-shadow: 0 40px 90px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.15);
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}
.phone::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 88px; height: 24px; background: #1e2535;
  border-radius: 0 0 14px 14px; z-index: 20;
}

/* progress bar */
.progress-bar {
  background: #E8DDD0; height: 6px; width: 100%;
  position: relative; margin-top: 30px;
}
.progress-fill {
  height: 100%; width: 25%;
  background: linear-gradient(90deg, #1A6FC4, #2A8AE8);
  border-radius: 0 3px 3px 0;
  transition: width .6s ease;
}
.progress-label {
  display: flex; justify-content: space-between;
  padding: 5px 18px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: .65rem; font-weight: 700;
  color: #8A7060; letter-spacing: .06em; text-transform: uppercase;
}

/* ── HEADER: Dex + Title ── */
.step-header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px 0;
}
.dex-coach-wrap {
  flex-shrink: 0; position: relative;
  width: 56px; height: 56px;
}
.dex-svg { animation: coachIdle 3s ease-in-out infinite; }
@keyframes coachIdle {
  0%,100% { transform: translateY(0) rotate(0); }
  45%     { transform: translateY(-4px) rotate(.7deg); }
}
/* Dex reaction animations */
.dex-svg.react-clap { animation: dexClap .6s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes dexClap {
  0%  { transform: scale(1) rotate(0); }
  30% { transform: scale(1.25) rotate(-6deg); }
  60% { transform: scale(1.15) rotate(4deg); }
  100%{ transform: scale(1) rotate(0); }
}
.dex-svg.react-jump { animation: dexJump .7s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes dexJump {
  0%  { transform: translateY(0) scale(1); }
  40% { transform: translateY(-16px) scale(1.08); }
  100%{ transform: translateY(0) scale(1); }
}

.step-title-wrap { flex: 1; }
.step-eyebrow {
  font-family: 'Nunito Sans', sans-serif;
  font-size: .65rem; font-weight: 800; color: #1A6FC4;
  text-transform: uppercase; letter-spacing: .12em;
  margin-bottom: 2px;
}
.step-title {
  font-family: 'Nunito', sans-serif;
  font-size: 1.25rem; font-weight: 900; color: #1A0A00; line-height: 1.1;
}
.step-title em { color: #1A6FC4; font-style: normal; }

/* speech bubble */
.dex-bubble {
  margin: 8px 18px 0;
  background: #ffffff;
  border: 2px solid #D4C8B8;
  border-radius: 14px;
  padding: 9px 14px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: .82rem; font-weight: 700; color: #2A1808;
  line-height: 1.45;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transition: all .25s;
  min-height: 38px;
}
.dex-bubble::before {
  content: ''; position: absolute;
  top: -10px; left: 22px;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-bottom: 10px solid #D4C8B8;
}
.dex-bubble::after {
  content: ''; position: absolute;
  top: -7px; left: 24px;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 8px solid #ffffff;
}
.dex-bubble.celebrate { background: #F0FFF4; border-color: #3A9A20; }
.dex-bubble.celebrate::after { border-bottom-color: #F0FFF4; }
.dex-bubble.celebrate::before { border-bottom-color: #3A9A20; }

/* scroll area */
.scroll-area {
  flex: 1; overflow-y: auto; padding: 10px 14px 14px;
  scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── DEBT CARD ── */
.debt-card {
  background: #ffffff;
  border: 2px solid #E0D8CE;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.05);
  animation: cardIn .4s cubic-bezier(.34,1.4,.64,1) both;
  position: relative;
}
@keyframes cardIn {
  from { transform: translateY(16px) scale(.96); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
.debt-card.added {
  border-color: #3A9A20;
  box-shadow: 0 0 0 3px rgba(58,154,32,.12), 0 2px 10px rgba(0,0,0,.05);
}

/* type pills */
.field-label {
  font-family: 'Nunito Sans', sans-serif;
  font-size: .65rem; font-weight: 800; color: #8A7060;
  letter-spacing: .12em; text-transform: uppercase;
  margin-bottom: 8px;
}
.type-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.type-pill {
  font-family: 'Nunito', sans-serif;
  font-size: .78rem; font-weight: 800;
  padding: 7px 14px; border-radius: 20px; cursor: pointer;
  border: 2px solid #D4C8B8; background: #F7F2EA; color: #4A2E10;
  transition: all .14s;
}
.type-pill:hover { border-color: #1A6FC4; color: #1A6FC4; background: #EFF6FF; }
.type-pill.active {
  background: #1A6FC4; border-color: #1A6FC4; color: white;
  box-shadow: 0 4px 12px rgba(26,111,196,.35);
}

/* input fields */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field-solo { margin-bottom: 10px; }
.inp-wrap { position: relative; }
.inp-label {
  font-family: 'Nunito Sans', sans-serif;
  font-size: .62rem; font-weight: 800; color: #8A7060;
  letter-spacing: .1em; text-transform: uppercase;
  display: block; margin-bottom: 5px;
}
.inp {
  width: 100%;
  background: #F7F2EA; border: 2px solid #D4C8B8;
  border-radius: 10px; padding: 11px 14px;
  font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 700;
  color: #1A0A00; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.inp::placeholder { color: #B0A090; font-weight: 600; }
.inp:focus { border-color: #1A6FC4; box-shadow: 0 0 0 3px rgba(26,111,196,.12); background: #fff; }
.inp-prefix {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; color: #8A7060;
}
.inp-suffix {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; color: #8A7060;
}
.inp.with-prefix { padding-left: 26px; }
.inp.with-suffix { padding-right: 26px; }

/* toggle */
.toggle-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.toggle {
  width: 44px; height: 24px; background: #D4C8B8; border-radius: 12px;
  position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.toggle.on { background: #1A6FC4; }
.toggle-dot {
  width: 18px; height: 18px; background: white; border-radius: 50%;
  position: absolute; top: 3px; left: 3px;
  transition: transform .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on .toggle-dot { transform: translateX(20px); }
.toggle-label {
  font-family: 'Nunito Sans', sans-serif;
  font-size: .78rem; font-weight: 700; color: #5A3A10;
}

/* remove button */
.remove-btn {
  position: absolute; top: 12px; right: 12px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #F7F2EA; border: 1.5px solid #D4C8B8;
  color: #A08070; font-size: .75rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; font-weight: 700;
}
.remove-btn:hover { background: #FFF0F0; border-color: #E07070; color: #C03010; }

/* total strip */
.total-strip {
  background: #1A0A00; border-radius: 14px;
  padding: 12px 16px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
  animation: fadeUp .3s ease both;
}
.total-left { font-family: 'Nunito Sans', sans-serif; font-size: .72rem; font-weight: 800; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .1em; }
.total-amount { font-family: 'Nunito', sans-serif; font-size: 1.45rem; font-weight: 900; color: #F5C030; }
.debt-count-badge {
  background: rgba(255,255,255,.12); border-radius: 10px;
  padding: 4px 10px;
  font-family: 'Nunito', sans-serif; font-size: .8rem; font-weight: 800; color: rgba(255,255,255,.7);
}

/* add button */
.add-btn {
  width: 100%; border-radius: 14px; padding: 13px;
  background: white; border: 2px dashed #1A6FC4;
  color: #1A6FC4; font-family: 'Nunito', sans-serif;
  font-size: .92rem; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all .14s; margin-bottom: 10px;
}
.add-btn:hover { background: #EFF6FF; border-style: solid; }

/* continue CTA */
.continue-btn {
  width: 100%; border-radius: 22px; padding: 16px;
  background: linear-gradient(135deg, #1A6FC4 0%, #0D5BAE 100%);
  border: none; color: white;
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 10px 28px rgba(26,111,196,.4);
  transition: all .15s; position: relative; overflow: hidden;
}
.continue-btn::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  animation: shimmer 2.4s ease-in-out infinite;
}
@keyframes shimmer { 0%{left:-100%} 100%{left:220%} }
.continue-btn:disabled { opacity: .45; cursor: not-allowed; }

/* XP toast */
.xp-toast {
  position: fixed; pointer-events: none; z-index: 1000;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 1.1rem; color: #1A6FC4;
  text-shadow: 0 2px 8px rgba(26,111,196,.3);
  animation: xpFloat 1.8s cubic-bezier(.22,1,.36,1) both forwards;
}
@keyframes xpFloat {
  0%  { opacity: 0; transform: scale(.6) translateY(0); }
  20% { opacity: 1; transform: scale(1.2) translateY(-10px); }
  80% { opacity: 1; transform: scale(1) translateY(-55px); }
  100%{ opacity: 0; transform: scale(.9) translateY(-80px); }
}


/* Tax / intro extras */
.tax-plan-row, .intro-rate-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.tax-note, .intro-note {
  font-family: 'Nunito Sans', sans-serif;
  font-size: .72rem; font-weight: 600; color: #8A6A40;
  background: #FFF8EE; border: 1.5px solid #E8D8B8;
  border-radius: 8px; padding: 8px 12px; margin-bottom: 10px;
  line-height: 1.5;
}
.intro-rate-fields { margin-bottom: 4px; }


/* ── SAVED DEBT PILL (collapsed) ── */
.debt-summary {
  background: #fff; border: 2px solid #3A9A20;
  border-radius: 14px; padding: 11px 16px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; cursor: pointer;
  transition: all .15s;
  animation: cardIn .35s cubic-bezier(.34,1.4,.64,1) both;
}
.debt-summary:hover { background: #F0FFF4; border-color: #2A8A10; }
.ds-check { width: 22px; height: 22px; background: #3A9A20; border-radius: 50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:white; font-size:.68rem; font-weight:900; }
.ds-info { flex:1; min-width:0; }
.ds-name { font-family:'Nunito',sans-serif; font-size:.9rem; font-weight:800; color:#1A0A00; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ds-meta { font-family:'Nunito Sans',sans-serif; font-size:.7rem; font-weight:700; color:#5A7A50; margin-top:1px; }
.ds-edit { font-size:.7rem; font-weight:800; color:#1A6FC4; padding:4px 10px; border:1.5px solid rgba(26,111,196,.3); border-radius:10px; background:#EFF6FF; white-space:nowrap; }
.ds-edit:hover { background:#DBEAFE; }

/* ── SAVE DEBT BUTTON ── */
.save-debt-btn {
  width:100%; border-radius:12px; padding:12px;
  background:linear-gradient(135deg,#3A9A20 0%,#2A8010 100%);
  border:none; color:white;
  font-family:'Nunito',sans-serif; font-size:.95rem; font-weight:800;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 6px 18px rgba(58,154,32,.35);
  transition:all .14s; margin-top:8px;
}
.save-debt-btn:hover { transform:translateY(-1px); box-shadow:0 8px 22px rgba(58,154,32,.45); }
.save-debt-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }


/* ── SAVED SECTION ── */
.saved-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 4px 6px;
  border-top: 2px solid #E0D8CE;
  margin-top: 8px; margin-bottom: 6px;
}
.saved-header-label {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Nunito', sans-serif; font-size: .78rem; font-weight: 800;
  color: #3A9A20; text-transform: uppercase; letter-spacing: .1em;
}
.total-amount-sm {
  font-family: 'Nunito', sans-serif; font-size: .88rem; font-weight: 900;
  color: #F5A020;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── MEGA CELEBRATION ANIMATIONS ── */
@keyframes dexSpin {
  0%   { transform: rotate(0deg) scale(1); }
  25%  { transform: rotate(90deg) scale(1.15); }
  50%  { transform: rotate(180deg) scale(1.2); }
  75%  { transform: rotate(270deg) scale(1.15); }
  100% { transform: rotate(360deg) scale(1); }
}
@keyframes dexMegaClap {
  0%   { transform: scale(1) rotate(0deg) translateY(0); }
  15%  { transform: scale(1.35) rotate(-8deg) translateY(-8px); }
  30%  { transform: scale(1.3) rotate(8deg) translateY(-12px); }
  50%  { transform: scale(1.4) rotate(-5deg) translateY(-16px); }
  70%  { transform: scale(1.3) rotate(5deg) translateY(-10px); }
  85%  { transform: scale(1.15) rotate(-2deg) translateY(-4px); }
  100% { transform: scale(1) rotate(0deg) translateY(0); }
}
@keyframes dexSpinClap {
  0%   { transform: rotate(0deg) scale(1) translateY(0); }
  20%  { transform: rotate(120deg) scale(1.3) translateY(-10px); }
  40%  { transform: rotate(240deg) scale(1.35) translateY(-14px); }
  60%  { transform: rotate(360deg) scale(1.3) translateY(-10px); }
  80%  { transform: rotate(400deg) scale(1.15) translateY(-4px); }
  100% { transform: rotate(360deg) scale(1) translateY(0); }
}
@keyframes bubbleCheer {
  0%,100% { transform: scale(1); }
  20%     { transform: scale(1.06) rotate(-1deg); }
  40%     { transform: scale(1.04) rotate(1deg); }
  60%     { transform: scale(1.06) rotate(-0.5deg); }
}

.dex-svg.mega-spin  { animation: dexSpinClap 1s cubic-bezier(.34,1.2,.64,1) both !important; }
.dex-svg.mega-clap  { animation: dexMegaClap .9s cubic-bezier(.34,1.4,.64,1) both !important; }
.dex-svg.react-clap { animation: dexMegaClap .7s cubic-bezier(.34,1.56,.64,1) both !important; }
.dex-svg.react-jump { animation: dexJump .7s cubic-bezier(.34,1.56,.64,1) both !important; }

/* Bigger XP toast */
.xp-toast {
  position: fixed; pointer-events: none; z-index: 9999;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 1.4rem; color: #1A6FC4;
  text-shadow: 0 2px 10px rgba(26,111,196,.4);
  animation: xpFloat 2s cubic-bezier(.22,1,.36,1) both forwards;
  text-align: center; white-space: nowrap;
}
@keyframes xpFloat {
  0%  { opacity:0; transform:scale(.5) translateY(0); }
  18% { opacity:1; transform:scale(1.4) translateY(-12px); }
  75% { opacity:1; transform:scale(1.1) translateY(-65px); }
  100%{ opacity:0; transform:scale(.9) translateY(-95px); }
}

/* dex-bubble bigger bounce on celebrate */
.dex-bubble.celebrate {
  animation: bubbleCheer .5s ease both;
  background: #F0FFF4; border-color: #3A9A20;
  font-size: .9rem;
}

/* champion banner that slides in */
.champ-banner {
  background: linear-gradient(135deg, #1A6FC4 0%, #0D4FA0 100%);
  border-radius: 12px; margin: 0 14px 8px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  animation: bannerSlide .45s cubic-bezier(.34,1.4,.64,1) both;
  box-shadow: 0 6px 20px rgba(26,111,196,.35);
}
@keyframes bannerSlide {
  from { transform: translateX(-110%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.champ-emoji { font-size: 1.4rem; flex-shrink: 0; }
.champ-text  {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: .82rem; color: white; line-height: 1.35;
}
.champ-text strong { color: #F5C030; display: block; font-size: .88rem; }

/* micro confetti pieces */
.conf-piece {
  position: fixed; border-radius: 2px; pointer-events: none; z-index: 9998;
  animation: confFall linear forwards;
}
@keyframes confFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120px) rotate(600deg); opacity: 0; }
}

</style>
</head>
<body>
<div class="phone" id="phone">
  <!-- progress -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label"><span>Step 1 of 4</span><span id="progressPct">25%</span></div>

  <!-- header -->
  <div class="step-header">
    <div class="dex-coach-wrap">
      <svg class="dex-svg" id="dexSvg" viewBox="0 0 100 100" width="56" height="56">
        <ellipse cx="14" cy="62" rx="8" ry="15" fill="#D4900A" transform="rotate(12,14,62)"/>
        <ellipse cx="86" cy="52" rx="8" ry="14" fill="#D4900A" transform="rotate(-25,86,52)"/>
        <circle cx="50" cy="52" r="32" fill="#EAA835"/>
        <ellipse cx="50" cy="70" rx="24" ry="11" fill="#C07820" opacity=".18"/>
        <circle cx="23" cy="28" r="10" fill="#D09828"/>
        <circle cx="77" cy="28" r="10" fill="#D09828"/>
        <circle cx="23" cy="27" r="5" fill="#EAA835" opacity=".5"/>
        <circle cx="77" cy="27" r="5" fill="#EAA835" opacity=".5"/>
        <ellipse cx="37" cy="46" rx="11.5" ry="12.5" fill="white"/>
        <ellipse cx="63" cy="46" rx="11.5" ry="12.5" fill="white"/>
        <circle cx="38" cy="48" r="8" fill="#1A0800" id="pupL"/>
        <circle cx="64" cy="48" r="8" fill="#1A0800" id="pupR"/>
        <circle cx="34" cy="44" r="3" fill="white"/>
        <circle cx="60" cy="44" r="3" fill="white"/>
        <circle cx="41" cy="51" r="1.3" fill="white" opacity=".8"/>
        <circle cx="67" cy="51" r="1.3" fill="white" opacity=".8"/>
        <path d="M27 33 Q37 27 46 32" stroke="#8A4A0C" stroke-width="2.2" fill="none" stroke-linecap="round" id="browL"/>
        <path d="M54 32 Q63 27 73 33" stroke="#8A4A0C" stroke-width="2.2" fill="none" stroke-linecap="round" id="browR"/>
        <path d="M32 64 Q50 75 68 64" stroke="#A86010" stroke-width="3" fill="none" stroke-linecap="round" id="dexMouth"/>
        <circle cx="32" cy="64" r="1.8" fill="#C07820" opacity=".45"/>
        <circle cx="68" cy="64" r="1.8" fill="#C07820" opacity=".45"/>
        <ellipse cx="25" cy="58" rx="6.5" ry="4" fill="#E87050" opacity=".2"/>
        <ellipse cx="75" cy="58" rx="6.5" ry="4" fill="#E87050" opacity=".2"/>
        <circle cx="50" cy="56" r="1.8" fill="#C07820" opacity=".3"/>
      </svg>
    </div>
    <div class="step-title-wrap">
      <div class="step-eyebrow">Step 1</div>
      <div class="step-title">Enter your <em>debts</em></div>
    </div>
  </div>

  <!-- speech bubble -->
  <div class="dex-bubble" id="dexBubble">Add each debt and I'll build your payoff plan! 💪</div>
  <div id="champBanner"></div>

  <!-- scroll area -->
  <div class="scroll-area">

    <!-- ACTIVE CARD (the one being filled in) -->
    <div id="activeCard"></div>

    <!-- ADD + DONE buttons always below the active card -->
    <button class="add-btn" onclick="addDebt()" id="addBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><path d="M12 5v14M5 12h14"/></svg>
      + Add Another Debt
    </button>

    <button class="continue-btn" id="continueBtn" onclick="doContinue()">
      Done Adding Debts. Build My Payoff Plan →
    </button>

    <!-- SAVED DEBTS below (collapsed pills) -->
    <div id="savedSection" style="display:none">
      <div class="saved-header" id="savedHeader">
        <div class="saved-header-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
          <span id="savedCountLabel">Saved debts</span>
        </div>
        <div class="total-amount-sm" id="totalAmt"></div>
      </div>
      <div id="savedCards"></div>
    </div>

  </div>
</div>

<script>
var debts = [];
var debtCount = 0;
var totalBalance = 0;
var celebrationCount = 0;

var MOODS = [
  { mouth:"M32 64 Q50 75 68 64", browL:"M27 33 Q37 27 46 32", browR:"M54 32 Q63 27 73 33" },
  { mouth:"M28 62 Q50 78 72 62", browL:"M25 31 Q37 24 46 30", browR:"M54 30 Q63 24 75 31" },
  { mouth:"M24 60 Q50 82 76 60", browL:"M23 29 Q37 21 46 28", browR:"M54 28 Q63 21 77 29" }
];

var REACTIONS = [
  { bubble:"YES! That took courage. You are already ahead of 90% of people! 🙌", mood:2, anim:'mega-clap', emoji:'🏆', title:'CHAMPION MOVE!', sub:"You just took action. That's what winners do.", xp:'+50 XP 🎯' },
  { bubble:"INCREDIBLE! You are staring debt in the face. That is power! 💪", mood:2, anim:'mega-spin', emoji:'⭐', title:"YOU'RE ON FIRE!", sub:"Every account added = one step closer to freedom.", xp:'🔥 On a roll!' },
  { bubble:"I am SO proud of you right now! This is exactly what champions do! 🎉", mood:2, anim:'mega-clap', emoji:'🚀', title:'UNSTOPPABLE!', sub:"Most people never even start. You are crushing it.", xp:'+75 XP 🚀' },
  { bubble:"WOW - you are SERIOUS about this! Look at you go! 🌟", mood:2, anim:'mega-spin', emoji:'💪', title:'ACTION TAKER!', sub:"You are building a life others only dream about.", xp:'LEGEND! ⭐' },
  { bubble:"Every single debt you add gets you closer to ZERO. Keep. Going. 🏅", mood:2, anim:'mega-clap', emoji:'🏅', title:'DEBT WARRIOR!', sub:"CuraDebt is proud of you. Seriously.", xp:'+100 XP 🏅' },
  { bubble:"This takes guts. You have it. I believe in you! 🦁", mood:2, anim:'mega-spin', emoji:'🦁', title:'LION-HEARTED!', sub:"Facing your debt is the bravest thing you can do.", xp:'FEARLESS! 🦁' }
];

// A debt is "complete" when all 4 fields are filled
function isDebtComplete(d) {
  if (!d.name.trim() || d.balance <= 0) return false;
  if (d.type === 'Tax Debt') {
    // Tax debt: no plan = just need balance. On plan = need payment too
    return d.onPlan ? (d.minPayment > 0) : true;
  }
  return d.minPayment > 0 && d.apr > 0;
}

function toggleTaxPlan(id) {
  var d = debts.find(function(x){ return x.id===id; });
  if (!d) return;
  d.onPlan = !d.onPlan;
  d._celebrated = false; // allow re-celebration after toggle
  renderCards();
}

function toggleIntro(id) {
  var d = debts.find(function(x){ return x.id===id; });
  if (!d) return;
  d.hasIntro = !d.hasIntro;
  renderCards();
}

function setDexMood(idx) {
  var m = MOODS[Math.min(idx, MOODS.length - 1)];
  var el = document.getElementById('dexMouth');
  var bl = document.getElementById('browL');
  var br = document.getElementById('browR');
  if (el) el.setAttribute('d', m.mouth);
  if (bl) bl.setAttribute('d', m.browL);
  if (br) br.setAttribute('d', m.browR);
}

function burstConfetti(anchorEl) {
  var rect = anchorEl ? anchorEl.getBoundingClientRect() : { left: window.innerWidth / 2 - 30, top: window.innerHeight / 2 - 30, width: 60, height: 60 };
  var colors = ['#F5C030', '#1A6FC4', '#3A9A20', '#F06030', '#ffffff', '#E8A020'];
  for (var i = 0; i < 22; i++) {
    (function () {
      var c = document.createElement('div');
      c.className = 'conf-piece';
      var size = 5 + Math.random() * 7;
      var angle = Math.random() * 360;
      var dist = 40 + Math.random() * 60;
      var dx = Math.cos(angle * Math.PI / 180) * dist;
      c.style.cssText =
        'width:' + size + 'px;height:' + size + 'px;' +
        'left:' + (rect.left + rect.width / 2 + dx - size / 2) + 'px;' +
        'top:' + (rect.top + rect.height / 2) + 'px;' +
        'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
        'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';' +
        'animation-duration:' + (0.7 + Math.random() * 0.8) + 's;' +
        'animation-delay:' + (Math.random() * 0.2) + 's;';
      document.body.appendChild(c);
      setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 1500);
    })();
  }
}

function showChampBanner(r) {
  var wrap = document.getElementById('champBanner');
  wrap.innerHTML = '';
  var banner = document.createElement('div');
  banner.className = 'champ-banner';
  banner.innerHTML =
    '<div class="champ-emoji">' + r.emoji + '</div>' +
    '<div class="champ-text"><strong>' + r.title + '</strong>' + r.sub + '</div>';
  wrap.appendChild(banner);
  setTimeout(function () {
    banner.style.transition = 'opacity .4s';
    banner.style.opacity = '0';
    setTimeout(function () { wrap.innerHTML = ''; }, 450);
  }, 3200);
}

function triggerCelebration() {
  var r = REACTIONS[celebrationCount % REACTIONS.length];
  celebrationCount++;
  var bubble = document.getElementById('dexBubble');
  var dex = document.getElementById('dexSvg');
  var dexWrap = document.querySelector('.dex-coach-wrap');

  bubble.textContent = r.bubble;
  bubble.className = 'dex-bubble celebrate';
  setTimeout(function () { bubble.className = 'dex-bubble'; }, 3500);

  setDexMood(2);
  setTimeout(function () { setDexMood(0); }, 3000);

  dex.className = 'dex-svg ' + r.anim;
  setTimeout(function () { dex.className = 'dex-svg'; }, 1100);

  setTimeout(function () { burstConfetti(dexWrap); }, 100);
  setTimeout(function () { burstConfetti(dexWrap); }, 450);

  showXP(r.xp, dexWrap);
  setTimeout(function () { showChampBanner(r); }, 300);
}

function showXP(text, anchorEl) {
  var rect = anchorEl ? anchorEl.getBoundingClientRect() : { left: window.innerWidth / 2 - 40, top: 100, width: 60 };
  var toast = document.createElement('div');
  toast.className = 'xp-toast';
  toast.textContent = text;
  toast.style.left = (rect.left + rect.width / 2 - 50) + 'px';
  toast.style.top = (rect.top + 20) + 'px';
  document.body.appendChild(toast);
  setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 2100);
}

function addDebt() {
  // Auto-save any open debt that has at least a balance
  var open = debts.find(function(d){ return !d._saved || d._expanded; });
  if (open && open.balance > 0) {
    if (!open.name.trim()) open.name = open.type;
    open._saved = true;
    open._expanded = false;
    // Don't trigger celebration here - only on explicit Save button
  }
  var id = 'd' + Date.now();
  debts.unshift({ id: id, type: 'Credit Card', name: '', balance: 0, minPayment: 0, apr: 0, introApr: 0, introEnds: '', hasIntro: false, onPlan: false, _celebrated: false, _saved: false, _expanded: false });
  debtCount = debts.length;
  renderCards();
  updateTotal();
}

function removeDebt(id) {
  debts = debts.filter(function(d){ return d.id !== id; });
  debtCount = debts.length;
  // If no open card left, add a fresh one
  var hasOpen = debts.some(function(d){ return !d._saved || d._expanded; });
  if (!hasOpen && debts.length === 0) {
    // nothing left - will show empty active zone
  }
  renderCards();
  updateTotal();
}

function setType(id, type) {
  var d = debts.find(function (x) { return x.id === id; });
  if (d) { d.type = type; renderCards(); }
}

function updateField(id, field, val) {
  var d = debts.find(function (x) { return x.id === id; });
  if (!d) return;
  if (field === 'balance' || field === 'minPayment' || field === 'apr' || field === 'introApr') {
    d[field] = parseFloat(val) || 0;
    if (field === 'balance') updateTotal();
  } else {
    d[field] = val;
  }
  // celebration fires only on explicit Save
}

function updateTotal() {
  totalBalance = debts.reduce(function(s, d) { return s + (d.balance || 0); }, 0);
  // Update running total in saved section header
  var amtEl = document.getElementById('totalAmt');
  if (amtEl) amtEl.textContent = totalBalance > 0 ? fmtMoney(totalBalance) : '';
  // Progress bar
  var savedCount = debts.filter(function(d){ return d._saved; }).length;
  var pct = Math.min(25 + savedCount * 8, 48);
  var pf = document.getElementById('progressFill');
  var pp = document.getElementById('progressPct');
  if (pf) pf.style.width = pct + '%';
  if (pp) pp.textContent = Math.round(pct) + '%';
}

function fmtMoney(v){ return '$'+parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function saveDebt(id) {
  var d = debts.find(function(x){ return x.id===id; });
  if (!d) return;
  if (!d.name.trim()) d.name = d.type;
  d._saved = true;
  d._celebrated = true;
  d._expanded = false;
  renderCards();
  updateTotal();
  setTimeout(triggerCelebration, 200);
}

function toggleExpand(id) {
  var d = debts.find(function(x){ return x.id===id; });
  if (!d) return;
  d._expanded = !d._expanded;
  d._saved = !d._expanded;
  if (d._expanded) d._celebrated = true;
  renderCards();
}

function buildCardHTML(d) {
  var types = ['Credit Card', 'Student Loan', 'Auto Loan', 'Medical', 'Personal Loan', 'Tax Debt', 'Other'];
  var isTax = d.type === 'Tax Debt';
  return (
    '<button class="remove-btn" onclick="removeDebt(\'' + d.id + '\')" title="Remove">✕</button>' +
    '<div class="field-label">Type</div>' +
    '<div class="type-grid">' +
      types.map(function(t){
        return '<button class="type-pill' + (d.type===t?' active':'') + '" onclick="setType(\'' + d.id + '\',\'' + t + '\')">' + t + '</button>';
      }).join('') +
    '</div>' +
    '<div class="field-solo">' +
      '<label class="inp-label">Debt Name</label>' +
      '<input class="inp" type="text" placeholder="' + (isTax ? 'e.g. IRS Balance 2023' : 'e.g. Chase Sapphire Card') + '" value="' + (d.name||'') + '" oninput="updateField(\'' + d.id + '\',\'name\',this.value)">' +
    '</div>' +
    '<div class="field-solo">' +
      '<label class="inp-label">Balance Owed</label>' +
      '<div class="inp-wrap"><span class="inp-prefix">$</span>' +
      '<input class="inp with-prefix" type="number" min="0" placeholder="0.00" value="' + (d.balance||'') + '" oninput="updateField(\'' + d.id + '\',\'balance\',this.value)">' +
      '</div>' +
    '</div>' +
    (isTax ?
      '<div class="tax-plan-row">' +
        '<div class="toggle' + (d.onPlan?' on':'') + '" onclick="toggleTaxPlan(\'' + d.id + '\')">' +
          '<div class="toggle-dot"></div>' +
        '</div>' +
        '<span class="toggle-label">On an IRS/State payment plan</span>' +
      '</div>' +
      (d.onPlan ?
        '<div class="field-row">' +
          '<div><label class="inp-label">Monthly Payment</label>' +
            '<div class="inp-wrap"><span class="inp-prefix">$</span>' +
            '<input class="inp with-prefix" type="number" min="0" placeholder="0.00" value="' + (d.minPayment||'') + '" oninput="updateField(\'' + d.id + '\',\'minPayment\',this.value)">' +
            '</div></div>' +
          '<div><label class="inp-label">Penalty Rate (APR)</label>' +
            '<div class="inp-wrap">' +
            '<input class="inp with-suffix" type="number" min="0" max="30" step="0.01" placeholder="e.g. 8" value="' + (d.apr||'') + '" oninput="updateField(\'' + d.id + '\',\'apr\',this.value)">' +
            '<span class="inp-suffix">%</span>' +
            '</div></div>' +
        '</div>'
        : '<p class="tax-note">No payment plan — included as a lump balance. Consult a tax professional about accruing penalties.</p>'
      )
      :
      '<div class="field-row">' +
        '<div><label class="inp-label">Min. Payment</label>' +
          '<div class="inp-wrap"><span class="inp-prefix">$</span>' +
          '<input class="inp with-prefix" type="number" min="0" placeholder="0.00" value="' + (d.minPayment||'') + '" oninput="updateField(\'' + d.id + '\',\'minPayment\',this.value)">' +
          '</div></div>' +
        '<div><label class="inp-label">Interest Rate (APR)</label>' +
          '<div class="inp-wrap">' +
          '<input class="inp with-suffix" type="number" min="0" max="100" step="0.01" placeholder="e.g. 22.99" value="' + (d.apr||'') + '" oninput="updateField(\'' + d.id + '\',\'apr\',this.value)">' +
          '<span class="inp-suffix">%</span>' +
          '</div></div>' +
      '</div>' +
      '<div class="intro-rate-row">' +
        '<div class="toggle' + (d.hasIntro?' on':'') + '" onclick="toggleIntro(\'' + d.id + '\')">' +
          '<div class="toggle-dot"></div>' +
        '</div>' +
        '<span class="toggle-label">Has a temporary intro / promotional rate</span>' +
      '</div>' +
      (d.hasIntro ?
        '<div class="intro-rate-fields">' +
          '<div class="field-row">' +
            '<div><label class="inp-label">Intro Rate</label>' +
              '<div class="inp-wrap">' +
              '<input class="inp with-suffix" type="number" min="0" max="100" step="0.01" placeholder="e.g. 0" value="' + (d.introApr||'') + '" oninput="updateField(\'' + d.id + '\',\'introApr\',this.value)">' +
              '<span class="inp-suffix">%</span>' +
              '</div></div>' +
            '<div><label class="inp-label">Intro Ends</label>' +
              '<input class="inp" type="month" value="' + (d.introEnds||'') + '" oninput="updateField(\'' + d.id + '\',\'introEnds\',this.value)">' +
            '</div>' +
          '</div>' +
          '<p class="intro-note">Intro rate applies until this date, then switches to standard APR.</p>' +
        '</div>'
        : '') +
    '') +
    '<button class="save-debt-btn" onclick="saveDebt(\'' + d.id + '\')">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>' +
      ' Save This Debt' +
    '</button>'
  );
}

function renderCards() {
  var activeDiv = document.getElementById('activeCard');
  var savedDiv = document.getElementById('savedCards');
  var savedSection = document.getElementById('savedSection');
  activeDiv.innerHTML = '';
  savedDiv.innerHTML = '';

  var activeDeb = debts.find(function(d){ return !d._saved || d._expanded; });
  var savedDebts = debts.filter(function(d){ return d._saved && !d._expanded; });

  // Render active/open card
  if (activeDeb) {
    var card = document.createElement('div');
    card.className = 'debt-card';
    card.innerHTML = buildCardHTML(activeDeb);
    activeDiv.appendChild(card);
  }

  // Render saved pills
  if (savedDebts.length > 0) {
    savedSection.style.display = 'block';
    document.getElementById('savedCountLabel').textContent =
      savedDebts.length + (savedDebts.length===1 ? ' debt saved' : ' debts saved');
    savedDebts.forEach(function(d) {
      var pill = document.createElement('div');
      pill.className = 'debt-summary';
      pill.onclick = function(){ toggleExpand(d.id); };
      var meta = fmtMoney(d.balance);
      if (d.apr) meta += ' · ' + d.apr + '% APR';
      if (d.type==='Tax Debt' && !d.onPlan) meta += ' · No plan';
      pill.innerHTML =
        '<div class="ds-check">✓</div>' +
        '<div class="ds-info">' +
          '<div class="ds-name">' + (d.name||d.type) + '</div>' +
          '<div class="ds-meta">' + d.type + ' · ' + meta + '</div>' +
        '</div>' +
        '<div class="ds-edit">Edit</div>';
      savedDiv.appendChild(pill);
    });
  } else {
    savedSection.style.display = 'none';
  }
}

function doContinue() {
  // If no debts at all, show a gentle prompt
  if (debts.length === 0) {
    var bubble = document.getElementById('dexBubble');
    bubble.textContent = "Add at least one debt first so I can build your plan! 💪";
    bubble.className = 'dex-bubble celebrate';
    setTimeout(function(){ bubble.className = 'dex-bubble'; }, 2500);
    return;
  }
  // Auto-save the first debt if it has at least a balance
  var incomplete = debts.filter(function(d){ return !isDebtComplete(d) && d.balance > 0; });
  incomplete.forEach(function(d){ d._celebrated = true; }); // mark so no double celebration
  // If first debt has no balance at all, prompt
  var anyBalance = debts.some(function(d){ return d.balance > 0; });
  if (!anyBalance) {
    var bubble = document.getElementById('dexBubble');
    bubble.textContent = "Enter at least a balance for your debt and I'll get started! 💪";
    bubble.className = 'dex-bubble celebrate';
    setTimeout(function(){ bubble.className = 'dex-bubble'; }, 2500);
    return;
  }
  // All good - proceed
  alert('Building your payoff plan! 🎯');
}

// Init: one empty card
var id0 = 'd' + Date.now();
debts.push({ id: id0, type: 'Credit Card', name: '', balance: 0, minPayment: 0, apr: 0, introApr: 0, introEnds: '', hasIntro: false, onPlan: false, _celebrated: false });
debtCount = 1;
renderCards();
</script>
</body>
</html>
