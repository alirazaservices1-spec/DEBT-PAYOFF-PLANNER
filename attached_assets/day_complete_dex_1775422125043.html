<style>
*{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes badgePop{0%{opacity:0;transform:scale(0.5)}70%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes quoteIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dexSwap{from{opacity:0;transform:scale(0.88) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes confetti-up{0%{opacity:0;transform:translateY(0) rotate(0)}25%{opacity:1}100%{opacity:0;transform:translateY(-30px) rotate(50deg)}}

/* Dex anims from source */
@keyframes float   {0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes nod     {0%,100%{transform:rotate(0)}35%{transform:rotate(-3deg)}70%{transform:rotate(3deg)}}
@keyframes pulse   {0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes bounce  {0%,100%{transform:translateY(0)}45%{transform:translateY(-12px)}}
@keyframes vibrate {0%,100%{transform:translate(0,0)}20%{transform:translate(-3px,-2px)}40%{transform:translate(3px,2px)}60%{transform:translate(-2px,3px)}80%{transform:translate(2px,-3px)}}
@keyframes lean    {0%,100%{transform:rotate(0) translateX(0)}50%{transform:rotate(6deg) translateX(4px)}}

.f-float  {animation:float   2.8s ease-in-out infinite}
.f-nod    {animation:nod     2.2s ease-in-out infinite}
.f-pulse  {animation:pulse   2s   ease-in-out infinite}
.f-bounce {animation:bounce  1.5s ease-in-out infinite}
.f-vibrate{animation:vibrate  .45s ease-in-out infinite}
.f-lean   {animation:lean    1.8s ease-in-out infinite;transform-origin:60px 70px}

.cd{animation:confetti-up 1.6s ease-out infinite}
.cd:nth-child(2){animation-delay:.35s}
.cd:nth-child(3){animation-delay:.7s}
.cd:nth-child(4){animation-delay:1.05s}
.cd:nth-child(5){animation-delay:1.4s}

.wrap{display:flex;justify-content:center;padding:32px}

.phone{
  width:345px;
  background:#1B1050;
  border-radius:46px;
  border:7px solid #0A0628;
  box-shadow:0 32px 80px rgba(0,0,0,0.5),0 8px 20px rgba(0,0,0,0.25);
  display:flex;flex-direction:column;align-items:center;
  padding:0;position:relative;overflow:hidden;
}
.phone::before{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:82px;height:5px;background:rgba(255,255,255,0.14);border-radius:3px;z-index:10}

.bg-glow{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 50% 25%,rgba(120,90,255,0.35) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(80,60,200,0.2) 0%,transparent 50%);
  pointer-events:none;
}

/* confetti bg pieces */
@keyframes cffall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(340px) rotate(500deg)}}
.cf{position:absolute;pointer-events:none;z-index:3}
.cf1{width:8px;height:8px;background:#F5C842;border-radius:2px;left:12%;top:8%;animation:cffall 3.2s linear 0.1s both}
.cf2{width:5px;height:12px;background:#7DE8B0;border-radius:1px;left:26%;top:4%;animation:cffall 3.5s linear 0.3s both}
.cf3{width:9px;height:5px;background:#FF8080;border-radius:2px;left:56%;top:6%;animation:cffall 2.9s linear 0.05s both;transform:rotate(-20deg)}
.cf4{width:7px;height:7px;background:#C0A8FF;border-radius:50%;left:72%;top:3%;animation:cffall 3.6s linear 0.4s both}
.cf5{width:8px;height:8px;background:#fff;border-radius:2px;left:86%;top:9%;animation:cffall 3.0s linear 0.2s both}
.cf6{width:5px;height:10px;background:#F5C842;border-radius:1px;left:6%;top:18%;animation:cffall 3.3s linear 0.65s both}
.cf7{width:7px;height:5px;background:#FF8080;border-radius:2px;left:44%;top:2%;animation:cffall 2.8s linear 0.15s both}
.cf8{width:6px;height:6px;background:#7DE8B0;border-radius:50%;left:91%;top:14%;animation:cffall 3.4s linear 0.5s both}

.top{
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:50px 22px 36px;
  position:relative;z-index:4;
}

/* Badges */
.badges{
  width:100%;display:flex;justify-content:space-between;
  margin-bottom:20px;
  animation:badgePop 0.55s cubic-bezier(0.34,1.56,0.64,1) both 0.1s;
}
.tbadge{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.16);
  border-radius:100px;padding:10px 16px;
}
.tbadge-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#fff;line-height:1}
.tbadge.streak .tbadge-text{color:#F5C842}
.tbadge.xp .tbadge-text{color:#80EEC0}

/* Dex container */
.dex-wrap{
  width:170px;height:190px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
  position:relative;
}
.dex-wrap svg{
  width:170px;height:190px;
  overflow:visible;
  animation:dexSwap 0.45s cubic-bezier(0.34,1.4,0.64,1) both;
}

/* Headline */
.headline{
  font-family:'DM Serif Display',serif;
  font-size:36px;font-weight:400;color:#fff;
  text-align:center;line-height:1.12;
  margin-bottom:18px;
  animation:fadeUp 0.5s ease both 0.82s;
}
.headline em{font-style:italic;color:#C0A8FF}

/* Quote card */
.quote-card{
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.13);
  border-radius:20px;
  padding:20px 18px 16px;
  margin-bottom:20px;
  position:relative;
  animation:fadeUp 0.55s ease both 1.0s;
  overflow:hidden;
}
.quote-card::before{
  content:'\201C';
  position:absolute;top:-10px;left:12px;
  font-family:'DM Serif Display',serif;
  font-size:72px;color:rgba(192,168,255,0.18);
  line-height:1;pointer-events:none;
}
.quote-text{
  font-family:'DM Serif Display',serif;
  font-size:17px;line-height:1.55;
  color:#fff;font-style:italic;
  position:relative;z-index:1;
}
.quote-attr{
  margin-top:10px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);
}
.quote-dots{
  display:flex;gap:5px;margin-top:12px;justify-content:center;
}
.qdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.3s,width 0.3s;cursor:pointer}
.qdot.on{background:#C0A8FF;width:14px;border-radius:10px}

/* Total strip */
.total{
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:22px;
  animation:fadeUp 0.5s ease both 1.2s;
}
.t-left .t-lbl{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);margin-bottom:4px;
}
.t-left .t-num{
  font-family:'DM Serif Display',serif;
  font-size:42px;color:#fff;line-height:1;
  display:flex;align-items:baseline;gap:5px;
}
.t-left .t-num sup{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:700;color:rgba(255,255,255,0.4);
}
.t-right{display:flex;flex-direction:column;align-items:center;gap:2px}
.t-fire{font-size:26px;line-height:1}
.t-streak{font-family:'DM Serif Display',serif;font-size:28px;color:#F5C842;line-height:1}
.t-sl{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.4)}

/* CTA */
.btn{
  width:100%;
  background:#C07820;color:#fff;
  border:none;border-radius:16px;
  padding:20px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;letter-spacing:0.01em;
  animation:fadeUp 0.5s ease both 1.4s;
  transition:background 0.13s,transform 0.08s;
  box-shadow:0 8px 28px rgba(192,120,32,0.4);
  margin-bottom:16px;
}
.btn:hover{background:#A86510}.btn:active{transform:scale(0.98)}

.skip{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;color:rgba(255,255,255,0.45);
  animation:fadeUp 0.4s ease both 1.5s;
}
.skip a{color:rgba(255,255,255,0.75);font-weight:700;text-decoration:underline}
</style>

</div>

    headline: "You crushed it\n<em>today!</em>",
    quote: "You just did what most people never do — you started.",
    attr: "Day 1"
  },

  },

  },

  },

    attr: "Month 8"
  },

  },

    quote: "Thirty days. This isn't motivation. It's identity.",
    attr: "Month 1"
  },
  {

    headline: "You came back.\n<em>That matters.</em>",
    quote: "Your past does not equal your future. Your progress is right here.",
    attr: "Recovery"
  }
];

// Pick today's starting index by day-of-year
const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
const startIdx = dayOfYear % messages.length;
// Pick 3 consecutive messages for the dots
const indices = [startIdx, (startIdx+1)%messages.length, (startIdx+2)%messages.length];
let current = 0;

function render(i) {
  const m = messages[indices[i]];

  // Swap Dex with animation
  const wrap = document.getElementById('dexWrap');
  wrap.innerHTML = DEX[m.dex];

  // Headline
  document.getElementById('headline').innerHTML = m.headline.replace('\n','<br>');

  // Quote with fade
  const qt = document.getElementById('quoteText');
  qt.style.animation = 'none';
  qt.offsetHeight;
  qt.style.animation = 'quoteIn 0.4s ease both';
  qt.textContent = m.quote;
  document.getElementById('quoteAttr').textContent = m.attr;

  // Dots
  document.querySelectorAll('.qdot').forEach((d,idx) => {
    d.classList.toggle('on', idx === i);
  });
}

// Build dots
const dotsEl = document.getElementById('quoteDots');
indices.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'qdot' + (i===0?' on':'');
  d.onclick = () => { current = i; render(i); };
  dotsEl.appendChild(d);
});

render(0);

// Auto-rotate every 6s
setInterval(() => {
  current = (current+1) % indices.length;
  render(current);
}, 6000);
